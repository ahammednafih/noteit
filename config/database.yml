# PostgreSQL database configuration for NoteIt (Rails 8)
default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: noteit_development
  queue:
    <<: *default
    database: noteit_development_queue

test:
  primary:
    <<: *default
    database: noteit_test
  queue:
    <<: *default
    database: noteit_test_queue

production:
  primary:
    <<: *default
    database: noteit_production
    username: noteit
    password: <%= ENV["NOTEIT_DATABASE_PASSWORD"] %>
  queue:
    <<: *default
    database: noteit_production_queue
    username: noteit
    password: <%= ENV["NOTEIT_DATABASE_PASSWORD"] %>
